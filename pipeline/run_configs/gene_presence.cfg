[essential run parameters - preset for E. coli dataset phases 1-9]
dataset_path = '/Users/921623492/Abdoul Thesis/src/STREAMLINE/data/Gene_Presence_Absence'
output_path = '/Users/921623492/Abdoul Thesis/results/gene_pa/2025-12-24/'
experiment_name = 'gene_pa_output'  
class_label = 'label'
instance_label = 'sample_id'
match_label = None
ignore_features_path = None
categorical_feature_path = None
quantitative_feature_path = ['gene_presence_absence.csv']

rep_data_path = '/Users/921623492/Abdoul Thesis/src/STREAMLINE/data/Gene_Presence_AbsenceRepData'
dataset_for_rep = '/Users/921623492/Abdoul Thesis/src/STREAMLINE/data/Gene_Presence_Absence/gene_pa_merged_train.csv'


[essential run parameters - phases to run - phases 1-9]
# If True, automatically runs all phases below up until and including do_report, automatically running 'compare_dataset' only if multiple target datasets included
do_till_report = False

[essential run parameters - phases to run]

do_till_report = False
do_eda = False 
do_dataprep = False
do_feat_imp = False # Enable MultiSURF feature importance (Phase 3)
do_feat_sel = False # Enable feature selection (Phase 4) - reduces 56K+ features to top informative ones
do_model = False  # Enable training phase (resume missing models)
do_stats = False  # Run after modeling completes
do_compare_dataset = False
do_report = False    # Run after modeling completes
do_replicate = True  # Phase 9: Disabled for now
do_rep_report = True  # Phase 10: Replication report (disabled)
do_cleanup = False


[general - phase 1]
cv_partitions = 3  
partition_method = 'Stratified'
categorical_cutoff = 10
sig_cutoff = 0.05
random_state = 42
verbose = True

[data processing - phase 1]
exclude_eda_output = ['correlation_plots', 'univariate_plots', 'describe_csv']
top_uni_features = 40
featureeng_missingness = 1.0
cleaning_missingness = 1.0
correlation_removal_threshold = 1.0


[imputing and scaling - phase 2]
impute_data = False
scale_data = False
multi_impute = False
overwrite_cv = False


[feature importance estimation - phase 3]
do_mutual_info = False  # Disabled to save time - MultiSURF alone captures both univariate and interactions
do_multisurf = False # Enable MultiSURF - detects feature interactions important for SNP data
use_turf = False
turf_pct = 0.5
instance_subset = 1500  # Subset instances for MultiSURF to speed up (use all if None)
n_jobs = 2


[feature selection - phase 4]
filter_poor_features = True  # Remove features with score <= 0 from all algorithms
max_features_to_keep = None  # Keep ALL informative features (44,822 with score > 0). Set to integer (e.g., 15000) to limit
export_scores = True
top_fi_features = 40  # Top features to visualize in plots
overwrite_cv_feat = False


[modeling - phase 5]
algorithms =['DT','RF','LR','XGB','KNN'] 
exclude = ['eLCS','XCS']
training_subsample = 0
use_uniform_fi = True
primary_metric = 'balanced_accuracy'
metric_direction = 'maximize'
n_trials = 100  # Increased from 30 for more thorough hyperparameter search
timeout = None  # Set to None for reproducibility - will complete all n_trials (was 900 = 15 min)
export_hyper_sweep_plots = True  # Enable to visualize hyperparameter optimization
save_plots = True
do_lcs_sweep = False
lcs_nu = 1
lcs_iterations = 2000
lcs_n = 2000
lcs_timeout = 1200
model_resubmit = True  # Enable resuming - will skip already completed models (CV folds 0,1,2)


[post-analysis - phase 6]
exclude_plots = None
metric_weight = 'balanced_accuracy'
top_model_fi_features = 50

[replication - phase 8]
exclude_rep_plots = None

[cleanup]
del_time = False
del_old_cv = False

[multiprocessing]
run_parallel = False
run_cluster = False
reserved_memory = 32 # in GB
queue = 'cpucluster'

[logging]
logging_level = 'INFO'
verbose = False
